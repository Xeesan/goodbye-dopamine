<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f1117"/>
  <rect width="512" height="512" rx="112" fill="url(#bg_grad)" opacity="0.6"/>
  
  <!-- Glow circle behind text -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)" opacity="0.15"/>
  
  <!-- Shield outline -->
  <path d="M256 80 L380 140 L380 280 C380 350 330 400 256 430 C182 400 132 350 132 280 L132 140 Z" 
        fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.3"/>
  
  <!-- G letter -->
  <text x="256" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" 
        font-size="200" font-weight="800" fill="#22d3ee">G</text>
  
  <!-- Tagline -->
  <text x="256" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" 
        font-size="36" font-weight="600" fill="#94a3b8" letter-spacing="8">GOOD BYE</text>
  <text x="256" y="462" text-anchor="middle" font-family="Inter, system-ui, sans-serif" 
        font-size="36" font-weight="700" fill="#22d3ee" letter-spacing="8">DOPAMINE</text>
  
  <defs>
    <radialGradient id="bg_grad" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f1117"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
